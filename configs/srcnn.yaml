# SRCNN Configuration
model:
  type: 'srcnn'
  input_channels: 1
  hidden_channels: 64
  kernel_size: 3
  num_layers: 3
  upsampling_factor: 2

data:
  sample_rate: 16000
  target_sample_rate: 32000
  segment_length: 16384
  batch_size: 16
  num_workers: 4
  augment: true
  noise_factor: 0.1
  pitch_shift_range: [-2.0, 2.0]
  time_stretch_range: [0.9, 1.1]

training:
  num_epochs: 100
  learning_rate: 0.001
  weight_decay: 1e-4
  optimizer: 'adam'
  scheduler: 'step'
  scheduler_params:
    step_size: 30
    gamma: 0.1
  early_stopping:
    patience: 10
    min_delta: 0.001

loss:
  type: 'multiscale'
  time_weight: 1.0
  spectral_weight: 0.1
  perceptual_weight: 0.1
  scales: [1, 2, 4]

evaluation:
  metrics: ['pesq', 'stoi', 'si_sdr', 'snr', 'spectral_mse', 'spectral_l1']
  sample_rate: 16000

logging:
  level: 'INFO'
  log_interval: 100

device: 'auto'  # auto, cpu, cuda, mps
seed: 42

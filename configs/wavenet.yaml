# WaveNet Configuration
model:
  type: 'wavenet'
  input_channels: 1
  hidden_channels: 128
  num_blocks: 8
  num_layers_per_block: 4
  upsampling_factor: 2

data:
  sample_rate: 16000
  target_sample_rate: 32000
  segment_length: 8192
  batch_size: 4
  num_workers: 4
  augment: true
  noise_factor: 0.1
  pitch_shift_range: [-2.0, 2.0]
  time_stretch_range: [0.9, 1.1]

training:
  num_epochs: 200
  learning_rate: 0.0001
  weight_decay: 1e-4
  optimizer: 'adamw'
  scheduler: 'plateau'
  scheduler_params:
    mode: 'min'
    factor: 0.5
    patience: 10
  early_stopping:
    patience: 20
    min_delta: 0.001

loss:
  type: 'multiscale'
  time_weight: 1.0
  spectral_weight: 0.3
  perceptual_weight: 0.2
  scales: [1, 2, 4, 8, 16]

evaluation:
  metrics: ['pesq', 'stoi', 'si_sdr', 'snr', 'spectral_mse', 'spectral_l1']
  sample_rate: 16000

logging:
  level: 'INFO'
  log_interval: 25

device: 'auto'
seed: 42
